services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
    command: python scheduler/scheduler.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "8082:80"
    depends_on:
      - backend
