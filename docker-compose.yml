services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  scheduler:
    build:
      context: ./backend
    command: python scheduler/scheduler.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8082:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
